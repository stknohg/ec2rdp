name: Build and Test

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - '**.yaml'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # Currently, this app only supports Windows and MacOS.
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache: true
      - name: Build
        run: go build -v ./...
      - name: Test
        run: go test -v ./...
